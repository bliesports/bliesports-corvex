<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORVEX</title>
    <link rel="icon" type="image/png" href="file_00000000879c71f79e5a56c96e4d7857.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #050505;
            overflow-x: hidden;
        }

        /* ÜST MENÜ */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            z-index: 1000;
        }

        .logo {
            width: 50px;
        }

        .menu-btn {
            width: 58px;
            height: 58px;
            border: none;
            border-radius: 18px;
            background: #1c1c1c;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }

        /* ANA EKRAN */
        .hero {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.85));
            gap: 30px;
        }

        .play-btn {
            text-decoration: none;
            background: #000;
            color: #ff00ff;
            border: 2px solid #ff00ff;
            padding: 22px 60px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 0 20px #ff00ff;
            transition: 0.3s;
        }

        .play-btn:hover {
            box-shadow: 0 0 20px #ff00ff, 0 0 50px #ff00ff, 0 0 80px #ff00ff;
        }

        /* MENÜ */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100vh;
            background: #121212;
            transition: .4s;
            z-index: 9999;
            overflow-y: auto;
        }

        .mobile-menu.active {
            right: 0;
        }

        .menu-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px;
        }

        .menu-logo {
            width: 50px;
        }

        .close-btn {
            width: 58px;
            height: 58px;
            border: none;
            border-radius: 18px;
            background: #242424;
            color: white;
            font-size: 26px;
            cursor: pointer;
        }

        .search-box {
            margin: 0 25px;
            background: #232323;
            border-radius: 22px;
            padding: 18px;
            color: #999;
            font-size: 28px;
        }

        .menu-item {
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 28px;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .menu-item:hover {
            color: #ff00ff;
        }

        /* BLI GİRİŞ BUTONU */
        .bli-login-btn {
            display: block;
            margin: 30px;
            background: #2b2b2b;
            color: white;
            text-decoration: none;
            padding: 28px;
            border-radius: 20px;
            font-size: 26px;
            text-align: left;
        }

        .bli-login-btn:hover {
            background: #3b3b3b;
        }

        .bli-login-btn i {
            margin-right: 15px;
            color: #ff00ff;
        }

        /* KULLANICI BİLGİ */
        .user-info {
            display: block;
            margin: 30px 30px 10px 30px;
            padding: 20px 28px;
            border-radius: 20px;
            font-size: 22px;
            color: white;
            text-align: left;
            border: 2px solid #4caf50;
        }

        .user-info i {
            margin-right: 15px;
            color: #4caf50;
        }

        .user-info .name {
            color: #ff00ff;
            font-weight: bold;
        }

        /* ÇIKIŞ BUTONU */
        .logout-btn {
            display: block;
            margin: 10px 30px 30px 30px;
            background: #2b1a1a;
            color: #ff3b30;
            border: 1px solid #ff3b30;
            padding: 18px 28px;
            border-radius: 20px;
            font-size: 20px;
            text-align: left;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #3a1a1a;
        }

        .logout-btn i {
            margin-right: 15px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<header>
    <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
    <button class="menu-btn" onclick="openMenu()">
        <i class="fas fa-bars"></i>
    </button>
</header>

<section class="hero">
    <a href="#" class="play-btn">
        ŞİMDİ OYNA
    </a>
</section>

<!-- MENÜ -->
<div class="mobile-menu" id="menu">
    <div class="menu-top">
        <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="menu-logo">
        <button class="close-btn" onclick="closeMenu()">
            <i class="fas fa-xmark"></i>
        </button>
    </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
    </div>

    <div class="menu-item">OYUN BİLGİLERİ</div>
    <div class="menu-item">MEDYA</div>
    <div class="menu-item">HABERLER</div>
    <div class="menu-item">DESTEK</div>
    <div class="menu-item">SOSYAL MEDYA</div>
    <div class="menu-item">ESPOR</div>
    <div class="menu-item">MAĞAZA</div>

    <!-- GİRİŞ YAPMAMIŞSA -->
    <a href="https://account.bliesports.com.tr/?client_id=Corvex&redirect_uri=https://corvex.bliesports.com.tr/callback.html&state=corvex_123" 
       class="bli-login-btn" id="loginBtn">
        <i class="fas fa-shield-alt"></i>
        BLI ile Giriş Yap
    </a>

    <!-- GİRİŞ YAPMIŞSA -->
    <div id="userArea" class="hidden">
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            Hoşgeldin, <span class="name" id="userName">Kullanıcı</span>
        </div>
        <button class="logout-btn" onclick="logoutUser()">
            <i class="fas fa-sign-out-alt"></i>
            Çıkış Yap
        </button>
    </div>
</div>

<script>
    // MENÜ AÇ/KAPA
    function openMenu() {
        document.getElementById("menu").classList.add("active");
    }

    function closeMenu() {
        document.getElementById("menu").classList.remove("active");
    }

    // KULLANICI KONTROL
    function checkUser() {
        const name = localStorage.getItem('corvex_user_name');
        const loginBtn = document.getElementById('loginBtn');
        const userArea = document.getElementById('userArea');
        const userName = document.getElementById('userName');

        if (name) {
            loginBtn.classList.add('hidden');
            userArea.classList.remove('hidden');
            userName.textContent = name;
        } else {
            loginBtn.classList.remove('hidden');
            userArea.classList.add('hidden');
        }
    }

    // ÇIKIŞ
    function logoutUser() {
        localStorage.removeItem('corvex_user_name');
        localStorage.removeItem('corvex_token');
        checkUser();
        closeMenu();
        alert('Çıkış yapıldı!');
    }

    // ============================================
    // CALLBACK'TEN GELDİYSE KULLANICIYI KAYDET
    // ============================================
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');

    // Hata yoksa ve code varsa
    if (code && !error) {
        // Kullanıcı adını sor
        const name = prompt('BLI hesabınızla giriş yaptınız! Adınızı girin:', '');
        if (name && name.trim() !== '') {
            localStorage.setItem('corvex_user_name', name.trim());
            localStorage.setItem('corvex_token', code);
            // URL'yi temizle
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }

    // SAYFA YÜKLENİNCE
    document.addEventListener('DOMContentLoaded', checkUser);
    window.addEventListener('pageshow', checkUser);
</script>

</body>
</html>
