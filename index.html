<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLI STUDIO</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
}

/* Üst Menü */

.topbar{
    width:100%;
    height:80px;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
}

.logo{
    height:50px;
}

.hamburger{
    width:55px;
    height:55px;
    border:none;
    border-radius:18px;
    background:#1d1d1d;
    color:#fff;
    font-size:24px;
    cursor:pointer;
}

/* Açılan Menü */

.menu{
    position:fixed;
    top:0;
    right:-100%;
    width:100%;
    height:100vh;
    background:linear-gradient(180deg,#1b1b1b,#111);
    transition:.4s;
    z-index:999;
    overflow-y:auto;
}

.menu.active{
    right:0;
}

/* Üst Kısım */

.menu-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px;
}

.menu-logo{
    height:55px;
}

.close-btn{
    width:60px;
    height:60px;
    border:none;
    border-radius:20px;
    background:#2b2b2b;
    color:#fff;
    font-size:28px;
    cursor:pointer;
}

/* Arama */

.search-box{
    margin:0 25px;
    background:#262626;
    border-radius:25px;
    padding:18px 20px;
    display:flex;
    align-items:center;
    color:#999;
    font-size:30px;
}

.search-box input{
    background:none;
    border:none;
    outline:none;
    color:white;
    width:100%;
    margin-left:15px;
    font-size:22px;
}

/* Menü Öğeleri */

.menu-items{
    padding:30px 25px;
}

.menu-item{
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:2px;
    padding:28px 0;
    border-bottom:1px solid rgba(255,255,255,.05);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.menu-item i{
    color:#888;
}

/* Oturum Aç */

.login-btn{
    display:block;
    width:calc(100% - 50px);
    margin:40px auto;
    background:#2c2c2c;
    color:white;
    text-decoration:none;
    padding:28px;
    border-radius:25px;
    font-size:30px;
}

.login-btn i{
    float:right;
}

</style>
</head>
<body>

<div class="topbar">

    <img src="file_00000000879c71f79e5a56c96e4d7857.png"
    class="logo">

    <button class="hamburger" onclick="openMenu()">
        <i class="fas fa-bars"></i>
    </button>

</div>

<div class="menu" id="menu">

    <div class="menu-header">

        <img src="file_00000000879c71f79e5a56c96e4d7857.png"
        class="menu-logo">

        <button class="close-btn" onclick="closeMenu()">
            <i class="fas fa-xmark"></i>
        </button>

    </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="">
    </div>

    <div class="menu-items">

        <div class="menu-item">
            OYUN BİLGİLERİ
            <i class="fas fa-caret-down"></i>
        </div>

        <div class="menu-item">
            MEDYA
        </div>

        <div class="menu-item">
            HABERLER
        </div>

        <div class="menu-item">
            DESTEK
            <i class="fas fa-caret-down"></i>
        </div>

        <div class="menu-item">
            SOSYAL MEDYA
            <i class="fas fa-caret-down"></i>
        </div>

        <div class="menu-item">
            ESPOR
            <i class="fas fa-arrow-up-right-from-square"></i>
        </div>

        <div class="menu-item">
            MAĞAZA
            <i class="fas fa-arrow-up-right-from-square"></i>
        </div>

    </div>

    <a href="https://accounts.bliesports.com.tr"
       class="login-btn">
        Oturum Aç
        <i class="fas fa-chevron-up"></i>
    </a>

</div>

<script>

function openMenu(){
    document.getElementById("menu").classList.add("active");
}

function closeMenu(){
    document.getElementById("menu").classList.remove("active");
}

</script>

</body>
</html>
