<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORVEX</title>
    <link rel="icon" type="image/png" href="file_00000000879c71f79e5a56c96e4d7857.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #050505;
            overflow-x: hidden;
        }

        /* ÜST MENÜ */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            z-index: 1000;
        }

        .logo {
            width: 50px;
        }

        .menu-btn {
            width: 58px;
            height: 58px;
            border: none;
            border-radius: 18px;
            background: #1c1c1c;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }

        /* ANA EKRAN */
        .hero {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.85));
            gap: 30px;
        }

        /* OYNA BUTONU */
        .play-btn {
            text-decoration: none;
            background: #000;
            color: #ff00ff;
            border: 2px solid #ff00ff;
            padding: 22px 60px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 0 20px #ff00ff;
            transition: 0.3s;
        }

        .play-btn:hover {
            box-shadow: 0 0 20px #ff00ff, 0 0 50px #ff00ff, 0 0 80px #ff00ff;
        }

        /* MENÜ */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100vh;
            background: #121212;
            transition: .4s;
            z-index: 9999;
            overflow-y: auto;
        }

        .mobile-menu.active {
            right: 0;
        }

        .menu-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px;
        }

        .menu-logo {
            width: 50px;
        }

        .close-btn {
            width: 58px;
            height: 58px;
            border: none;
            border-radius: 18px;
            background: #242424;
            color: white;
            font-size: 26px;
            cursor: pointer;
        }

        .search-box {
            margin: 0 25px;
            background: #232323;
            border-radius: 22px;
            padding: 18px;
            color: #999;
            font-size: 28px;
        }

        .menu-item {
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 28px;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .menu-item:hover {
            color: #ff00ff;
        }

        /* ======================================== */
        /* BLI GİRİŞ BUTONU (SADECE MENÜ İÇİN) */
        /* ======================================== */
        .bli-login-btn {
            display: block;
            margin: 30px;
            background: #2b2b2b;
            color: white;
            text-decoration: none;
            padding: 28px;
            border-radius: 20px;
            font-size: 26px;
            text-align: left;
        }

        .bli-login-btn:hover {
            background: #3b3b3b;
        }

        .bli-login-btn i {
            margin-right: 15px;
            color: #ff00ff;
        }

        /* ======================================== */
        /* GİRİŞ YAPMIŞ KULLANICI GÖSTERİMİ */
        /* ======================================== */
        .user-welcome {
            display: block;
            margin: 30px 30px 10px 30px;
            padding: 20px 28px;
            border-radius: 20px;
            font-size: 24px;
            color: white;
            text-align: left;
            border: 2px solid #4caf50;
        }

        .user-welcome i {
            margin-right: 15px;
            color: #4caf50;
        }

        .user-welcome .name {
            color: #ff00ff;
            font-weight: bold;
        }

        /* ======================================== */
        /* ÇIKIŞ YAP BUTONU */
        /* ======================================== */
        .logout-btn {
            display: block;
            margin: 10px 30px 30px 30px;
            background: #2b1a1a;
            color: #ff3b30;
            text-decoration: none;
            padding: 18px 28px;
            border-radius: 20px;
            font-size: 20px;
            text-align: left;
            border: 1px solid #ff3b30;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #3a1a1a;
        }

        .logout-btn i {
            margin-right: 15px;
        }

        /* GİZLEME */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<header>
    <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
    <button class="menu-btn" onclick="openMenu()">
        <i class="fas fa-bars"></i>
    </button>
</header>

<section class="hero">
    <a href="#" class="play-btn">
        ŞİMDİ OYNA
    </a>
</section>

<!-- AÇILAN MENÜ -->
<div class="mobile-menu" id="menu">
    <div class="menu-top">
        <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="menu-logo">
        <button class="close-btn" onclick="closeMenu()">
            <i class="fas fa-xmark"></i>
        </button>
    </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
    </div>

    <div class="menu-item">OYUN BİLGİLERİ</div>
    <div class="menu-item">MEDYA</div>
    <div class="menu-item">HABERLER</div>
    <div class="menu-item">DESTEK</div>
    <div class="menu-item">SOSYAL MEDYA</div>
    <div class="menu-item">ESPOR</div>
    <div class="menu-item">MAĞAZA</div>

    <!-- ======================================== -->
    <!-- GİRİŞ YAPMAMIŞSA: BLI ile Giriş Yap -->
    <!-- ======================================== -->
    <a href="https://account.bliesports.com.tr/?client_id=Corvex&redirect_uri=https://corvex.bliesports.com.tr/callback.html&state=corvex_123" 
       class="bli-login-btn" id="bliLoginBtn">
        <i class="fas fa-shield-alt"></i>
        BLI ile Giriş Yap
    </a>

    <!-- ======================================== -->
    <!-- GİRİŞ YAPMIŞSA: KULLANICI BİLGİLERİ -->
    <!-- ======================================== -->
    <div id="userLoggedIn" class="hidden">
        <div class="user-welcome">
            <i class="fas fa-user-circle"></i>
            Hoşgeldin, <span class="name" id="userNameDisplay">Kullanıcı</span>
        </div>
        <a href="#" class="logout-btn" onclick="logoutUser()">
            <i class="fas fa-sign-out-alt"></i>
            Çıkış Yap
        </a>
    </div>
</div>

<script>
    // ============================================
    // MENÜ KONTROL
    // ============================================
    function openMenu() {
        document.getElementById("menu").classList.add("active");
    }

    function closeMenu() {
        document.getElementById("menu").classList.remove("active");
    }

    // ============================================
    // KULLANICI BİLGİLERİNİ LOCALSTORAGE'DAN AL
    // ============================================
    function getUserInfo() {
        const userData = localStorage.getItem('corvex_user');
        if (userData) {
            try {
                return JSON.parse(userData);
            } catch {
                return null;
            }
        }
        return null;
    }

    // ============================================
    // MENÜYÜ GÜNCELLE
    // ============================================
    function updateMenu() {
        const user = getUserInfo();
        const loginBtn = document.getElementById('bliLoginBtn');
        const userSection = document.getElementById('userLoggedIn');
        const userNameDisplay = document.getElementById('userNameDisplay');

        if (user && user.name) {
            // Giriş yapmış
            loginBtn.classList.add('hidden');
            userSection.classList.remove('hidden');
            userNameDisplay.textContent = user.name;
        } else {
            // Giriş yapmamış
            loginBtn.classList.remove('hidden');
            userSection.classList.add('hidden');
        }
    }

    // ============================================
    // ÇIKIŞ YAP
    // ============================================
    function logoutUser() {
        localStorage.removeItem('corvex_user');
        localStorage.removeItem('corvex_token');
        updateMenu();
        closeMenu();
        alert('Çıkış yapıldı!');
    }

    // ============================================
    // CALLBACK'TEN GELEN KULLANICI BİLGİLERİNİ KAYDET
    // ============================================
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state');
    const error = urlParams.get('error');

    // Hata yoksa ve code varsa giriş başarılı
    if (code && !error) {
        // Kullanıcı adını al (callback'ten geliyoruz)
        // Account'tan gelen kullanıcı adını burada alabilirsin
        // Şimdilik prompt ile soruyoruz
        const userName = prompt('BLI hesabınızla giriş yaptınız! Kullanıcı adınızı girin:', 'Kullanıcı');
        if (userName) {
            localStorage.setItem('corvex_user', JSON.stringify({ name: userName }));
            localStorage.setItem('corvex_token', code);
            // URL'yi temizle
            window.history.replaceState({}, document.title, window.location.pathname);
            updateMenu();
        }
    }

    // ============================================
    // SAYFA YÜKLENDİĞİNDE
    // ============================================
    document.addEventListener('DOMContentLoaded', function() {
        updateMenu();
    });

    // Sayfa her göründüğünde kontrol et
    window.addEventListener('pageshow', function() {
        updateMenu();
    });
</script>

</body>
    </html>
