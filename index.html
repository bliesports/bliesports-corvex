<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CORVEX</title>

<!-- FAVICON -->
<link rel="icon"
href="file_00000000879c71f79e5a56c96e4d7857.png">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#050505;
    overflow-x:hidden;
}

/* ÜST MENÜ */

header{
    width:100%;
    height:90px;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    position:fixed;
    top:0;
    z-index:1000;
}

.logo{
    width:55px;
}

.menu-btn{
    width:70px;
    height:70px;
    border:none;
    border-radius:25px;
    background:#1b1b1b;
    color:white;
    font-size:32px;
}

/* HERO */

.hero{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,.6),
    rgba(0,0,0,.8));
}

/* OYNA BUTONU */

.play-btn{
    background:black;
    color:#ff00ff;
    text-decoration:none;
    padding:25px 70px;
    border:2px solid #ff00ff;
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;
    box-shadow:0 0 20px #ff00ff;
}

.play-btn:hover{
    box-shadow:
    0 0 20px #ff00ff,
    0 0 50px #ff00ff;
}

/* MENÜ */

.mobile-menu{
    position:fixed;
    top:0;
    right:-100%;
    width:100%;
    height:100vh;
    background:#111;
    z-index:9999;
    transition:.4s;
    overflow-y:auto;
}

.mobile-menu.active{
    right:0;
}

.menu-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:30px;
}

.menu-logo{
    width:55px;
}

.close-btn{
    width:70px;
    height:70px;
    border:none;
    border-radius:25px;
    background:#222;
    color:white;
    font-size:35px;
}

.search{
    margin:0 25px;
    background:#222;
    border-radius:25px;
    padding:20px;
}

.search i{
    color:white;
    font-size:30px;
}

.menu-item{
    color:white;
    font-size:26px;
    font-weight:bold;
    padding:30px;
    letter-spacing:2px;
}

.login-btn{
    display:block;
    margin:30px;
    background:#2a2a2a;
    color:white;
    text-decoration:none;
    padding:30px;
    border-radius:25px;
    font-size:30px;
}

</style>
</head>
<body>

<header>

<img class="logo"
src="file_00000000879c71f79e5a56c96e4d7857.png">

<button class="menu-btn"
onclick="openMenu()">
<i class="fas fa-bars"></i>
</button>

</header>

<section class="hero">

<a href="#" class="play-btn">
ŞİMDİ OYNA
</a>

</section>

<div class="mobile-menu" id="menu">

<div class="menu-top">

<img class="menu-logo"
src="file_00000000879c71f79e5a56c96e4d7857.png">

<button class="close-btn"
onclick="closeMenu()">
<i class="fas fa-xmark"></i>
</button>

</div>

<div class="search">
<i class="fas fa-search"></i>
</div>

<div class="menu-item">OYUN BİLGİLERİ</div>
<div class="menu-item">MEDYA</div>
<div class="menu-item">HABERLER</div>
<div class="menu-item">DESTEK</div>
<div class="menu-item">SOSYAL MEDYA</div>
<div class="menu-item">ESPOR</div>
<div class="menu-item">MAĞAZA</div>

<a class="login-btn"
href="https://account.bliesports.com.tr">
Oturum Aç
</a>

</div>

<script>

function openMenu(){
document.getElementById("menu").classList.add("active");
}

function closeMenu(){
document.getElementById("menu").classList.remove("active");
}

</script>

</body>
    </html>
