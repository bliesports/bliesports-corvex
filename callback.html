<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORVEX - Giriş Yapılıyor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        .logo {
            width: 80px;
            margin-bottom: 30px;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid #1c1c1c;
            border-top: 4px solid #ff00ff;
            border-radius: 50%;
            margin: 30px auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #888;
            font-size: 16px;
        }
        .success {
            color: #4caf50;
        }
        .error {
            color: #ff3b30;
        }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 40px;
            background: #ff00ff;
            color: #000;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            box-shadow: 0 0 30px #ff00ff;
        }
    </style>
</head>
<body>

<div class="container" id="content">
    <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
    
    <div class="loader"></div>
    
    <h2>🔐 Giriş Yapılıyor...</h2>
    <p>BLI ESPORTS hesabınız doğrulanıyor.</p>
</div>

<script>
    // ============================================
    // URL'den parametreleri al
    // ============================================
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state');
    const error = urlParams.get('error');

    const content = document.getElementById('content');

    // ============================================
    // Hata varsa göster
    // ============================================
    if (error === 'access_denied') {
        content.innerHTML = `
            <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
            <h2 style="color:#ff3b30;">❌ Erişim Reddedildi</h2>
            <p>BLI ESPORTS hesabınıza erişim izni vermediniz.</p>
            <a href="/" class="btn">Ana Sayfaya Dön</a>
        `;
    } 
    // ============================================
    // Code varsa (başarılı giriş)
    // ============================================
    else if (code) {
        // Oyun içi giriş işlemleri burada yapılır
        // Token almak için BLI API'ye istek atılır
        
        content.innerHTML = `
            <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
            <h2 class="success">✅ Giriş Başarılı!</h2>
            <p>BLI ESPORTS hesabınızla giriş yaptınız.</p>
            <p style="font-size:12px; color:#666; margin-top:10px;">
                Code: ${code.substring(0, 10)}...
            </p>
            <a href="/" class="btn">Oyuna Başla</a>
        `;

        // ============================================
        // TOKEN ALMA İŞLEMİ (Arka planda)
        // ============================================
        async function exchangeCodeForToken() {
            try {
                // BLI sunucusuna token isteği
                const response = await fetch('https://account.bliesports.com.tr/oauth_token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        client_id: 'Corvex Oyun',
                        client_secret: 'corvex_gizli_anahtar', // Gerçek projede güvenli saklanır
                        code: code
                    })
                });

                const data = await response.json();
                console.log('Token alındı:', data);

                // Token'ı localStorage'a kaydet
                localStorage.setItem('bli_token', data.access_token);
                localStorage.setItem('bli_user', JSON.stringify(data.user));

            } catch (error) {
                console.error('Token alınırken hata:', error);
            }
        }

        // Token almayı dene (CORS sorunu olabilir, şimdilik pasif)
        // exchangeCodeForToken();

    } 
    // ============================================
    // Parametre yoksa hata
    // ============================================
    else {
        content.innerHTML = `
            <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
            <h2 style="color:#ff3b30;">⚠️ Geçersiz İstek</h2>
            <p>Giriş yapılırken bir hata oluştu.</p>
            <a href="/" class="btn">Ana Sayfaya Dön</a>
        `;
    }
</script>

</body>
</html>
