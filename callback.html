<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORVEX</title>
    <link rel="icon" type="image/png" href="file_00000000879c71f79e5a56c96e4d7857.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            text-align: center;
            color: white;
            padding: 40px;
            max-width: 500px;
        }
        .logo {
            width: 80px;
            margin-bottom: 30px;
        }
        .success { color: #4caf50; }
        .error { color: #ff3b30; }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 40px;
            background: #ff00ff;
            color: #000;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
        }
        .btn:hover {
            box-shadow: 0 0 30px #ff00ff;
        }
        .info {
            background: #121212;
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
            text-align: left;
            border: 1px solid #2a2a2a;
        }
        .info .label {
            color: #666;
            font-size: 12px;
        }
        .info .value {
            color: white;
            font-size: 18px;
            margin-bottom: 8px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="box" id="content">
    <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
    <h2>🔄 Yönlendiriliyor...</h2>
    <p style="color:#888;">BLI hesabınız doğrulanıyor.</p>
</div>

<script>
    // ============================================
    // TÜM PARAMETRELERİ AL
    // ============================================
    const url = window.location.href;
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');

    const content = document.getElementById('content');

    // ============================================
    // HATA AYIKLAMA - KONSOLE YAZ
    // ============================================
    console.log('========================================');
    console.log('CALLBACK SAYFASI ÇALIŞTI');
    console.log('TAM URL:', url);
    console.log('CODE:', code);
    console.log('STATE:', state);
    console.log('ERROR:', error);
    console.log('========================================');

    // ============================================
    // REDDET
    // ============================================
    if (error === 'access_denied') {
        content.innerHTML = `
            <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
            <h2 class="error">❌ Erişim Reddedildi</h2>
            <p style="color:#888;">BLI hesabınıza erişim izni vermediniz.</p>
            <a href="/" class="btn">Ana Sayfaya Dön</a>
        `;
    } 
    // ============================================
    // BAŞARILI - CODE VAR
    // ============================================
    else if (code && code.length > 0) {
        content.innerHTML = `
            <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
            <h2 class="success">✅ Giriş Başarılı!</h2>
            <p style="color:#888;">BLI hesabınızla giriş yaptınız.</p>
            
            <div class="info">
                <div class="label">🔑 Kod</div>
                <div class="value">${code}</div>
                <div class="label">📌 State</div>
                <div class="value">${state || 'Yok'}</div>
            </div>
            
            <a href="/" class="btn">Ana Sayfaya Dön</a>
        `;
    } 
    // ============================================
    // HATA - CODE YOK
    // ============================================
    else {
        content.innerHTML = `
            <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
            <h2 class="error">⚠️ Hata!</h2>
            <p style="color:#888;">Code parametresi gelmedi.</p>
            
            <div class="info">
                <div class="label">📎 URL</div>
                <div class="value" style="font-size:12px;">${url}</div>
                <div class="label">🔑 Code</div>
                <div class="value">${code || 'GELMEDİ'}</div>
                <div class="label">📌 State</div>
                <div class="value">${state || 'GELMEDİ'}</div>
            </div>
            
            <a href="/" class="btn">Ana Sayfaya Dön</a>
        `;
    }
</script>

</body>
</html>
