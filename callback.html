<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORVEX - Giriş Yapılıyor</title>
    <link rel="icon" type="image/png" href="file_00000000879c71f79e5a56c96e4d7857.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
            max-width: 500px;
        }
        .logo {
            width: 80px;
            margin-bottom: 30px;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid #1c1c1c;
            border-top: 4px solid #ff00ff;
            border-radius: 50%;
            margin: 30px auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #888;
            font-size: 16px;
        }
        .success {
            color: #4caf50;
        }
        .error {
            color: #ff3b30;
        }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 40px;
            background: #ff00ff;
            color: #000;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            box-shadow: 0 0 30px #ff00ff;
        }
        .user-info {
            background: #121212;
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
            text-align: left;
            border: 1px solid #2a2a2a;
        }
        .user-info .label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
        }
        .user-info .value {
            color: white;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .status-success {
            background: #1a3a1a;
            color: #4caf50;
        }
        .status-error {
            background: #3a1a1a;
            color: #ff3b30;
        }
    </style>
</head>
<body>

<div class="container" id="content">
    <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
    
    <div class="loader"></div>
    
    <h2>🔐 Giriş Yapılıyor...</h2>
    <p>BLI ESPORTS hesabınız doğrulanıyor.</p>
</div>

<script>
    // ============================================
    // URL'den parametreleri al
    // ============================================
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state');
    const error = urlParams.get('error');

    const content = document.getElementById('content');

    // ============================================
    // HATA DURUMU
    // ============================================
    if (error === 'access_denied') {
        content.innerHTML = `
            <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
            <h2 class="error">❌ Erişim Reddedildi</h2>
            <p>BLI ESPORTS hesabınıza erişim izni vermediniz.</p>
            <div style="margin:20px 0;">
                <span class="status-badge status-error">❌ Reddedildi</span>
            </div>
            <a href="/" class="btn">Ana Sayfaya Dön</a>
        `;
    } 
    // ============================================
    // BAŞARILI GİRİŞ
    // ============================================
    else if (code && state === 'corvex_123') {
        content.innerHTML = `
            <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
            <h2 class="success">✅ Giriş Başarılı!</h2>
            <p>BLI ESPORTS hesabınızla CORVEX'e giriş yaptınız.</p>
            
            <div class="user-info">
                <div class="label">👤 Kullanıcı</div>
                <div class="value" id="userName">Yükleniyor...</div>
                
                <div class="label">📧 E-posta</div>
                <div class="value" id="userEmail">Yükleniyor...</div>
                
                <div style="margin-top:12px;">
                    <span class="status-badge status-success">✅ Oturum Açık</span>
                </div>
            </div>
            
            <p style="font-size:12px; color:#444; margin-top:10px;">
                Kod: ${code.substring(0, 10)}...
            </p>
            
            <a href="/" class="btn">🎮 Oyuna Başla</a>
        `;

        // ============================================
        // KULLANICI BİLGİLERİNİ AL (Firestore'dan)
        // ============================================
        async function getUserInfo() {
            try {
                // Firebase ile kullanıcı bilgilerini al
                // Burada basitçe localStorage'a kaydedelim
                const userData = {
                    name: 'BLI Kullanıcısı',
                    email: 'kullanici@bli.com'
                };
                
                // localStorage'a kaydet
                localStorage.setItem('corvex_user', JSON.stringify(userData));
                localStorage.setItem('corvex_token', code);
                
                // Ekranda göster
                document.getElementById('userName').textContent = userData.name;
                document.getElementById('userEmail').textContent = userData.email;
                
            } catch (error) {
                console.error('Kullanıcı bilgileri alınamadı:', error);
                document.getElementById('userName').textContent = 'Hata!';
                document.getElementById('userEmail').textContent = 'Tekrar dene';
            }
        }

        getUserInfo();

    } 
    // ============================================
    // GEÇERSİZ İSTEK
    // ============================================
    else {
        content.innerHTML = `
            <img src="file_00000000879c71f79e5a56c96e4d7857.png" class="logo">
            <h2 class="error">⚠️ Geçersiz İstek</h2>
            <p>Giriş yapılırken bir hata oluştu.</p>
            <p style="font-size:14px; color:#666; margin-top:10px;">
                Code: ${code || 'Yok'}<br>
                State: ${state || 'Yok'}<br>
                Error: ${error || 'Yok'}
            </p>
            <a href="/" class="btn">Ana Sayfaya Dön</a>
        `;
    }
</script>

</body>
</html>
